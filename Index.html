<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Punto Adiona</title>
</head>

<body>

    <header>

        <nav>
            <!-- Aquí irá tu navbar -->
        </nav>

        <!-- Carrusel -->
        <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">

            <!-- Indicadores -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleCaptions"
                    data-bs-slide-to="0" class="active"></button>

                <button type="button" data-bs-target="#carouselExampleCaptions"
                    data-bs-slide-to="1"></button>

                <button type="button" data-bs-target="#carouselExampleCaptions"
                    data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">

                <!-- carru 1 -->
                <div class="carousel-item active">
                    <img src="fotos/1.jpg" class="d-block w-100" alt="Imagen 1">

                    <div class="carousel-caption d-none d-md-block">
                       <button type="button" class="btn btn-outline-light" onclick="guardarEnStorage()">Ver más</button>
                    </div>
                </div>

                <!-- carru 2 2 -->
                <div class="carousel-item">
                    <img src="fotos/2.jpg" class="d-block w-100" alt="Imagen 2">

                    <div class="hero-caption">

                        <div class="hero-text">

                            <h1>
                                Tu próxima <br>
                                aventura <br>
                                comienza <br>
                                aquí.
                            </h1>

                

                        </div>

                    </div>

                </div>

                <!-- carru 3 -->
                <div class="carousel-item">
                    <img src="fotos/3.jpg" class="d-block w-100" alt="Imagen 3">

                    <div class="carousel-caption d-none d-md-block">
                      <button type="button" class="btn btn-outline-light" onclick="guardarEnStorage()">Ver más</button>
                    </div>
                </div>

            </div>

            <!-- Flechas -->
            <button class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExampleCaptions"
                data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>

            </button>

            <button class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExampleCaptions"
                data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>

            </button>

        </div>

    </header>

    <main>

        <section id="inicio">

            <h1>Inicio</h1>

        </section>

    </main>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
