<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Catálogo</title>
</head>
<body>
    <header class="py-4 text-center">
    <h1 class="display-6">Catalogo</h1>
    </header>

    <main class="container my-4">
        <section class="gallery d-flex gap-3">
            <!-- Card 1: MTB -->
        <div class="card image-card mtb" role="img" aria-label="MTB">
            <button class="overlay-btn" type="button">MTB</button>
        </div>

        <!-- Card 2: BMX -->
        <div class="card image-card bmx" role="img" aria-label="BMX">
            <button class="overlay-btn" type="button">BMX</button>
        </div>

        <!-- Card 3: RUTA -->
        <div class="card image-card ruta" role="img" aria-label="RUTA">
            <button class="overlay-btn" type="button">RUTA</button>
        </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
