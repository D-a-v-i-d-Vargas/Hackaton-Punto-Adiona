<div class="carrito-modulo">
    <h2 class="carrito-titulo">🛒 Tu Carrito de Compras</h2>
    
    <div class="carrito-layout">
        <div class="carrito-cuerpo">
            <ul id="carrito-lista" class="carrito-lista">
                <li class="carrito-vacio">El carrito está vacío</li>
            </ul>
        </div>

        <div class="carrito-resumen">
            <h3>Resumen de Pedido</h3>
            
            <div class="carrito-fila">
                <span>Subtotal:</span>
                <span id="carrito-subtotal">$0.00</span>
            </div>
            <div class="carrito-fila">
                <span>IVA (16%):</span>
                <span id="carrito-iva">$0.00</span>
            </div>
            <div class="carrito-fila">
                <span>Costo de envío:</span>
                <span id="carrito-envio">$0.00</span>
            </div>
            
            <hr class="carrito-divisor">
            
            <div class="carrito-fila-total">
                <strong>Total:</strong>
                <span id="carrito-total-precio">$0.00</span>
            </div>
            
            <button class="carrito-btn-pagar" onclick="procesarPago()">Proceder al Pago</button>
        </div>
    </div>

    <style>
        .carrito-modulo {
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #333;
            padding: 10px;
        }
        .carrito-titulo {
            color: #1e293b;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }
        .carrito-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .carrito-cuerpo {
            flex: 2;
            min-width: 300px;
        }
        .carrito-resumen {
            flex: 1;
            min-width: 280px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            align-self: flex-start;
        }
        .carrito-lista {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .carrito-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
        }
        .carrito-vacio {
            color: #94a3b8;
            font-style: italic;
            text-align: center;
            padding: 20px;
            background: #ffffff;
            border: 1px dashed #cbd5e1;
            border-radius: 6px;
        }
        .carrito-fila {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
            color: #475569;
        }
        .carrito-fila-total {
            display: flex;
            justify-content: space-between;
            font-size: 19px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #carrito-total-precio {
            color: #10b981;
        }
        .carrito-divisor {
            border: 0;
            border-top: 1px solid #cbd5e1;
            margin: 15px 0;
        }
        .carrito-btn-pagar {
            width: 100%;
            background-color: #3b82f6;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .carrito-btn-pagar:hover {
            background-color: #14d547;
        }
    </style>

    <script>
        // Objeto global compartido en el navegador
        window.carritoData = window.carritoData || {
            items: [],
            subtotal: 0,
            envioFijo: 500 // Costo de envío base en pesos
        };

        function agregarAlCarrito(nombre, precio) {
            const datos = window.carritoData;
            
            // Verificar si la bicicleta ya está en la lista
            const itemExistente = datos.items.find(item => item.nombre === nombre);
            
            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                datos.items.push({ nombre: nombre, precio: precio, cantidad: 1 });
            }
            
            datos.subtotal += precio;
            actualizarInterfazCarrito();
        }

        function actualizarInterfazCarrito() {
            const datos = window.carritoData;
            const listaElemento = document.getElementById('carrito-lista');
            
            // Limpiar vista previa
            listaElemento.innerHTML = '';
            
            if (datos.items.length === 0) {
                listaElemento.innerHTML = '<li class="carrito-vacio">El carrito está vacío</li>';
                document.getElementById('carrito-subtotal').innerText = "$0.00";
                document.getElementById('carrito-iva').innerText = "$0.00";
                document.getElementById('carrito-envio').innerText = "$0.00";
                document.getElementById('carrito-total-precio').innerText = "$0.00";
                return;
            }

            // Renderizar los productos agregados
            datos.items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'carrito-item';
                li.innerHTML = `
                    <div>
                        <strong>${item.nombre}</strong><br>
                        <small style="color:#64748b">Cant: ${item.cantidad}</small>
                    </div>
                    <strong>$${(item.precio * item.cantidad).toLocaleString('es-MX', {minimumFractionDigits: 2})}</strong>
                `;
                listaElemento.appendChild(li);
            });

            // OPERACIONES MATEMÁTICAS
            const subtotal = datos.subtotal;
            const iva = subtotal * 0.16;
            const envio = datos.envioFijo;
            const totalFinal = subtotal + iva + envio;

            // ACTUALIZAR PANTALLA CON FORMATO DE MONEDA MEXICANA
            document.getElementById('carrito-subtotal').innerText = `$${subtotal.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('carrito-iva').innerText = `$${iva.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('carrito-envio').innerText = `$${envio.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('carrito-total-precio').innerText = `$${totalFinal.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
        }

        function procesarPago() {
            const datos = window.carritoData;
            if (datos.items.length === 0) {
                alert("Tu carrito está vacío.");
                return;
            }
            
            const totalFinal = datos.subtotal + (datos.subtotal * 0.16) + datos.envioFijo;
            alert(`💳 ¡Pedido Confirmado!\n\nEl total neto con IVA y envío incluidos es: $${totalFinal.toLocaleString('es-MX', {minimumFractionDigits: 2})}\n\n¡Gracias por tu preferencia!`);
            
            // Limpiar todo después de comprar
            datos.items = [];
            datos.subtotal = 0;
            actualizarInterfazCarrito();
        }
    </script>
</div>
