<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punta Adiona - Footer</title>
    <link rel="stylesheet" href="estilos.css" />
</head>

<body>

    <!-- ===== cuerpo ===== -->
    <footer class="site-footer">

        <!-- email -->
        <div class="footer-newsletter">
            <div class="newsletter-content">
                <h3>Suscríbete a nuestro newsletter</h3>
                <form class="newsletter-form" onsubmit="return false;">
                    <input type="email" class="newsletter-input" placeholder="Tu correo electrónico"
                        aria-label="Tu correo electrónico" required />
                    <button type="submit" class="newsletter-btn">Suscribirme</button>
                </form>
            </div>
        </div>

        <!-- en medio -->
        <div class="footer-main">

            <div class="footer-column footer-brand">
                <h2>Punta Adiona</h2>
                <p>Momentos únicos, experiencias inolvidables.</p>
            </div>

            <div class="footer-column footer-contact">
                <h4>Contacto</h4>
                <p class="contact-item">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path
                            d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.61 21 3 13.39 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.58a1 1 0 0 1-.25 1.01l-2.2 2.2z" />
                    </svg>
                    <span>811 377 8703</span>
                </p>
            </div>

            <div class="footer-column footer-social">
                <h4>Síguenos</h4>
                <div class="social-icons">
                    <a href="#" class="social-link" aria-label="Facebook">

                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

        <div class="footer-bottom">
            <p>&copy; 2026 Punta Adiona. Todos los derechos reservados.</p>
